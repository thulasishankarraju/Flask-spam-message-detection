<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spam Detection</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            padding-top: 80px;
        }
        
        .box {
            background: white;
            width: 520px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
        }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            margin-top: 20px;
            padding: 10px 24px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .result {
            margin-top: 24px;
            font-size: 22px;
            color: green;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="box">

        <h1>Spam Detection Using ML</h1>

        <form method="POST">

            <textarea name="message" placeholder="Enter your message here" required></textarea>

            <br>

            <button type="submit">

                Check Message

            </button>

        </form>

        {% if prediction %}

        <div class="result">

            {{ prediction }}

        </div>

        {% endif %}

    </div>

</body>

</html>
